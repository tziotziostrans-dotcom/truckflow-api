# Copy to EC2: /etc/nginx/sites-available/api.truckflowhq.com
# Then: sudo ln -sf /etc/nginx/sites-available/api.truckflowhq.com /etc/nginx/sites-enabled/
#       sudo nginx -t && sudo systemctl reload nginx

server {
    listen 443 ssl http2;
    server_name api.truckflowhq.com;

    # SSL paths — adjust to match your certbot/Let's Encrypt setup
    ssl_certificate     /etc/letsencrypt/live/api.truckflowhq.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.truckflowhq.com/privkey.pem;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /socket.io/ {
        proxy_pass http://localhost:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }
}

server {
    listen 80;
    server_name api.truckflowhq.com;
    return 301 https://$host$request_uri;
}
